spring.security.oauth2.client.registration.keycloak.client-id=id
spring.security.oauth2.client.registration.keycloak.client-secret=secret
spring.security.oauth2.client.registration.keycloak.scope=openid, profile, roles
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri=http://localhost:8000/login/oauth2/code/oauth2-demo-client

spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8180/realms/oauth2-demo-realm
spring.security.oauth2.client.provider.keycloakt.user-name-attribute=preferred_username